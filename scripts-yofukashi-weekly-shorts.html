  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      videos = JSON.parse(raw);

      videos = getInitialSeed();
      saveVideos();
    }
  } catch(e){
    console.error('loadVideos failed', e);
    videos = getInitialSeed();
  }
}

// ─── URL parsing ───
function extractVideoId(url){
  if(!url) return null;
  const patterns = [
    /youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/,
    /youtube\.com\/watch\?v=([a-zA-Z0-9_-]{11})/,
    /youtu\.be\/([a-zA-Z0-9_-]{11})/,
    /youtube\.com\/embed\/([a-zA-Z0-9_-]{11})/,
    /^([a-zA-Z0-9_-]{11})$/  // raw video id
  ];
  for(const p of patterns){
    const m = url.match(p);
    if(m) return m[1];
  }
  return null;
}

// ─── oEmbed via noembed (CORS-friendly) ───
async function fetchVideoInfo(url){
  try{
    const apiUrl = 'https://noembed.com/embed?url=' + encodeURIComponent(url);
    const res = await fetch(apiUrl);
    if(!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if(data.error) throw new Error(data.error);
    return {
      title: data.title || '',
      channel: data.author_name || '',
      thumbnail: data.thumbnail_url || ''
    };
  } catch(e){
    console.warn('noembed failed, trying direct YouTube oEmbed', e);
    try{
      const apiUrl = 'https://www.youtube.com/oembed?url=' + encodeURIComponent(url) + '&format=json';
      const res = await fetch(apiUrl);
      if(!res.ok) throw new Error('HTTP ' + res.status);
      const data = await res.json();
      return {
        title: data.title || '',
        channel: data.author_name || '',
        thumbnail: data.thumbnail_url || ''
      };
    } catch(e2){
      throw new Error('Both oEmbed APIs failed. URL might be invalid.');
    }
  }
}

async function autoFetchInfo(){
  const url = document.getElementById('m-url').value.trim();
  const vid = extractVideoId(url);
  if(!vid){
    toast('有効なYouTube URLを入力してください', 'err');
    return;
  }
  const cleanUrl = 'https://www.youtube.com/watch?v=' + vid;
  toast('取得中...', 'ok');
  try{
    const info = await fetchVideoInfo(cleanUrl);
    if(info.title) document.getElementById('m-title').value = info.title;
    if(info.channel) document.getElementById('m-channel').value = info.channel;
    document.getElementById('preview').style.display = 'flex';
    document.getElementById('prev-thumb').src = info.thumbnail || ('https://i.ytimg.com/vi/' + vid + '/hqdefault.jpg');
    document.getElementById('prev-title').textContent = info.title;
    document.getElementById('prev-channel').textContent = info.channel;
    toast('情報を取得しました', 'ok');
  } catch(e){
    console.error(e);
    // Fallback: just show thumbnail from videoId, user enters title manually
    document.getElementById('preview').style.display = 'flex';
    document.getElementById('prev-thumb').src = 'https://i.ytimg.com/vi/' + vid + '/hqdefault.jpg';
    document.getElementById('prev-title').textContent = '（取得失敗）手動でタイトル入力してください';
    document.getElementById('prev-channel').textContent = '';
    toast('自動取得失敗、手動で入力してください', 'err');
  }
}

// ─── Modal ───
function openAddModal(){
  editIndex = -1;
  document.getElementById('modal-title').firstChild.textContent = '動画を追加 ';
  document.getElementById('m-url').value = '';
  document.getElementById('m-title').value = '';
  document.getElementById('m-channel').value = '';
  document.getElementById('m-region').value = 'jp';
  document.getElementById('m-category').value = 'チャレンジ';
  document.getElementById('m-views').value = '';
  document.getElementById('m-hot').value = '0';
  document.getElementById('m-comment').value = '';
  document.getElementById('preview').style.display = 'none';
  document.getElementById('modal-bg').classList.add('show');
}
function openEditModal(idx){
  editIndex = idx;
  const v = videos[idx];
  document.getElementById('modal-title').firstChild.textContent = '動画を編集 ';
  document.getElementById('m-url').value = v.url || '';
  document.getElementById('m-title').value = v.title || '';
  document.getElementById('m-channel').value = v.channel || '';
  document.getElementById('m-region').value = v.region || 'jp';
  document.getElementById('m-category').value = v.category || 'チャレンジ';
  document.getElementById('m-views').value = v.viewsK || '';
  document.getElementById('m-hot').value = v.hot ? '1' : '0';
  document.getElementById('m-comment').value = v.comment || '';
  if(v.vid){
    document.getElementById('preview').style.display = 'flex';
    document.getElementById('prev-thumb').src = 'https://i.ytimg.com/vi/' + v.vid + '/hqdefault.jpg';
    document.getElementById('prev-title').textContent = v.title;
    document.getElementById('prev-channel').textContent = v.channel;
  }
  document.getElementById('modal-bg').classList.add('show');
}
function closeModal(){
  document.getElementById('modal-bg').classList.remove('show');
}

function saveVideo(){
  const url = document.getElementById('m-url').value.trim();
  const title = document.getElementById('m-title').value.trim();
  const channel = document.getElementById('m-channel').value.trim();
  const vid = extractVideoId(url);

  if(!title){
    toast('タイトルを入力してください', 'err');
    return;
  }

  const data = {
    id: editIndex >= 0 ? videos[editIndex].id : ('vid-' + Date.now()),
    url: vid ? 'https://www.youtube.com/shorts/' + vid : url,
    vid: vid || '',
    title,
    channel,
    region: document.getElementById('m-region').value,
    category: document.getElementById('m-category').value,
    viewsK: +document.getElementById('m-views').value || 0,
    hot: document.getElementById('m-hot').value === '1' ? 1 : 0,
    comment: document.getElementById('m-comment').value.trim(),
    addedDate: editIndex >= 0 ? videos[editIndex].addedDate : new Date().toISOString().slice(0,10)
  };

  if(editIndex >= 0){
    videos[editIndex] = data;
    toast('更新しました', 'ok');
  } else {
    videos.unshift(data);
    toast('追加しました', 'ok');
  }
  saveVideos();
  closeModal();
  render();
}

function deleteVideo(idx){
  if(!confirm('この動画を削除しますか？')) return;
  videos.splice(idx, 1);
  saveVideos();
  render();
  toast('削除しました', 'ok');
}

// ─── Render ───
function render(){
  const region = document.querySelector('#filter-region button.active').dataset.r;
  const time = document.querySelector('#filter-time button.active').dataset.t;
  const cat = document.querySelector('#filter-cat button.active').dataset.c;
  const search = document.getElementById('search').value.toLowerCase();
  const sort = document.getElementById('sort').value;

  let filtered = videos.slice();
  if(region !== 'all') filtered = filtered.filter(v => v.region === region);
  if(cat !== 'all') filtered = filtered.filter(v => v.category === cat);
  if(time !== 'all'){
    const now = new Date();
    const cutoff = new Date(now);
    if(time === 'week') cutoff.setDate(now.getDate() - 7);
    if(time === 'month') cutoff.setDate(now.getDate() - 30);
    filtered = filtered.filter(v => new Date(v.addedDate) >= cutoff);
  }
  if(search){
    filtered = filtered.filter(v =>
      (v.title || '').toLowerCase().includes(search) ||
      (v.channel || '').toLowerCase().includes(search) ||
      (v.comment || '').toLowerCase().includes(search)
    );
  }

  if(sort === 'new') filtered.sort((a,b) => (b.addedDate || '').localeCompare(a.addedDate || ''));
  if(sort === 'old') filtered.sort((a,b) => (a.addedDate || '').localeCompare(b.addedDate || ''));
  if(sort === 'views') filtered.sort((a,b) => (b.viewsK || 0) - (a.viewsK || 0));
  if(sort === 'hot') filtered.sort((a,b) => (b.hot || 0) - (a.hot || 0) || (b.viewsK || 0) - (a.viewsK || 0));

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');

  if(filtered.length === 0){
    grid.style.display = 'none';
    empty.style.display = 'block';
  } else {
    grid.style.display = 'grid';
    empty.style.display = 'none';
    grid.innerHTML = filtered.map((v, i) => {
      const realIdx = videos.indexOf(v);
      const thumbUrl = v.vid ? `https://i.ytimg.com/vi/${v.vid}/hqdefault.jpg` :
        'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="180" height="320" viewBox="0 0 180 320"><rect width="180" height="320" fill="%231a1a2e"/><text x="90" y="160" text-anchor="middle" fill="%23666" font-size="14">No URL</text></svg>';
      return `
        <div class="card" data-vid="${v.vid}" onclick="playCard(this)">
          <div class="card-actions">
            <button onclick="event.stopPropagation();openEditModal(${realIdx})" title="編集">✎</button>
            <button onclick="event.stopPropagation();deleteVideo(${realIdx})" title="削除">🗑</button>
          </div>
          <div class="thumb">
            <img src="${thumbUrl}" alt="" loading="lazy">
            ${v.vid ? '<div class="play">▶</div>' : ''}
          </div>
          <div class="embed">
            ${v.vid ? `<iframe src="" data-src="https://www.youtube.com/embed/${v.vid}?autoplay=1&playsinline=1" allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>` : ''}
          </div>
          <div class="card-body">
            <div class="card-title">${escHtml(v.title)}</div>
            <div class="card-meta">
              <span class="tag tg-${v.region === 'jp' ? 'jp' : 'intl'}">${v.region === 'jp' ? '🇯🇵' : '🌐'}</span>
              <span class="tag tg-cat">${escHtml(v.category)}</span>
              ${v.hot ? '<span class="tag tg-hot">🔥</span>' : ''}
            </div>
            <div class="card-footer">
              <span class="card-channel">${escHtml(v.channel || '—')}</span>
              ${v.viewsK ? `<span>${v.viewsK >= 1000 ? (v.viewsK/1000).toFixed(1)+'M' : v.viewsK+'K'}</span>` : ''}
            </div>
          </div>
        </div>`;
    }).join('');
  }
  updateStats();
}

function playCard(el){
  if(el.classList.contains('playing')) return;
  const iframe = el.querySelector('iframe');
  if(iframe && iframe.dataset.src){
    iframe.src = iframe.dataset.src;
  }
  el.classList.add('playing');
}

function updateStats(){
  document.getElementById('st-total').textContent = videos.length;
  document.getElementById('st-jp').textContent = videos.filter(v => v.region === 'jp').length;
  document.getElementById('st-intl').textContent = videos.filter(v => v.region === 'intl').length;
  const weekAgo = new Date();
  weekAgo.setDate(weekAgo.getDate() - 7);
  document.getElementById('st-week').textContent = videos.filter(v => new Date(v.addedDate) >= weekAgo).length;
}

function escHtml(s){
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toast(msg, type){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  setTimeout(() => t.className = 'toast', 2200);
}

// ─── Import / Export ───
function exportData(){
  const data = {
    exportedAt: new Date().toISOString(),
    videos: videos
  };
  const blob = new Blob([JSON.stringify(data, null, 2)], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'yofukashi-weekly-shorts-' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
  toast('エクスポートしました', 'ok');
}

function importData(event){
  const file = event.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try{
      const data = JSON.parse(e.target.result);
      const list = Array.isArray(data) ? data : (data.videos || []);
      if(!Array.isArray(list)) throw new Error('Invalid format');
      if(confirm(`${list.length}件をインポートします。既存データを上書きしますか？\nOK＝上書き / キャンセル＝マージ追加`)){
        videos = list;
      } else {
        // Merge by id
        for(const item of list){
          const existing = videos.findIndex(v => v.id === item.id);
          if(existing >= 0) videos[existing] = item;
          else videos.push(item);
        }
      }
      saveVideos();
      render();
      toast(`${list.length}件をインポート`, 'ok');
    } catch(e){
      console.error(e);
      toast('インポート失敗：JSONが不正です', 'err');
    }
  };
  reader.readAsText(file);
  event.target.value = '';
}

// ─── Filter events ───
document.querySelectorAll('.tg').forEach(tg => {
  tg.addEventListener('click', e => {
    const btn = e.target.closest('button');
    if(!btn) return;
    tg.querySelectorAll('button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  });
});
document.getElementById('search').addEventListener('input', render);
document.getElementById('sort').addEventListener('change', render);

// Close modal on background click
document.getElementById('modal-bg').addEventListener('click', e => {
  if(e.target.id === 'modal-bg') closeModal();
});

// ─── Init ───
loadVideos();
render();
</script>
